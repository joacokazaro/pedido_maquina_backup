<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2f63"/>
      <stop offset="1" stop-color="#07173b"/>
    </linearGradient>
    <linearGradient id="gear" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#28e1e3"/>
      <stop offset="0.55" stop-color="#2bafc6"/>
      <stop offset="1" stop-color="#1172c1"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#28e1e3" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#28e1e3" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#28e1e3" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <g transform="rotate(-24 32 32)">
    <rect x="-6" y="7" width="76" height="1.6" rx="0.8" fill="url(#beam)" opacity="0.7"/>
    <rect x="-6" y="56" width="76" height="1.6" rx="0.8" fill="url(#beam)" opacity="0.5"/>
  </g>

  <circle cx="32" cy="32" r="23" fill="#28e1e3" opacity="0.12"/>

  <g fill="url(#gear)">
    <rect x="28" y="7" width="8" height="12" rx="2.5" transform="rotate(0 32 32)"/>
    <rect x="28" y="7" width="8" height="12" rx="2.5" transform="rotate(45 32 32)"/>
    <rect x="28" y="7" width="8" height="12" rx="2.5" transform="rotate(90 32 32)"/>
    <rect x="28" y="7" width="8" height="12" rx="2.5" transform="rotate(135 32 32)"/>
    <rect x="28" y="7" width="8" height="12" rx="2.5" transform="rotate(180 32 32)"/>
    <rect x="28" y="7" width="8" height="12" rx="2.5" transform="rotate(225 32 32)"/>
    <rect x="28" y="7" width="8" height="12" rx="2.5" transform="rotate(270 32 32)"/>
    <rect x="28" y="7" width="8" height="12" rx="2.5" transform="rotate(315 32 32)"/>
    <circle cx="32" cy="32" r="18"/>
  </g>

  <circle cx="32" cy="32" r="11" fill="#081c44"/>
  <circle cx="32" cy="32" r="11" fill="none" stroke="#28e1e3" stroke-width="1.4" opacity="0.5"/>
</svg>
